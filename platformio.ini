; ============================================================================
; PCB Test Framework — PlatformIO configuratie
; ============================================================================
; Elke [env:...] is een hardware-revisie. Kies bij uploaden welke je target:
;   pio run -e thermocouple_sim7080g_v1   (of via VS Code dropdown)
;
; De -D flags sturen welk hardware-headerbestand wordt geladen.
; ============================================================================

[platformio]
default_envs = thermocouple_sim7080g_v1

; ── Gedeelde instellingen ────────────────────────────────────────────────────
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
lib_extra_dirs = /home/koen/.platformio/packages/framework-arduinoespressif32/libraries
build_flags = -I/home/koen/.platformio/packages/framework-arduinoespressif32/libraries/SD_MMC/src -I/home/koen/.platformio/packages/framework-arduinoespressif32/libraries/FS/src
lib_deps =
    adafruit/Adafruit MAX31856 library
    FS
    SD_MMC

; ── Hardware revisies ────────────────────────────────────────────────────────

[env:thermocouple_sim7080g_v1]
board = esp32-s3-devkitc-1
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
build_flags =
    ${env.build_flags}
    -D HW_REVISION=\"TC_SIM7080G_V1\"
    -D HW_CONFIG_FILE=\"hardware/hw_tc_sim7080g_v1.h\"
    -D MODEM_TYPE_SIM7080G
    -D BOARD_HAS_FUEL_GAUGE
    -D BOARD_HAS_CHARGE_CONTROLLER
    -D BOARD_HAS_THERMOCOUPLE=3
    -D BOARD_HAS_SD_CARD

[env:thermocouple_sim7070g_v1]
board = esp32-s3-devkitc-1
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
build_flags =
    ${env.build_flags}
    -D HW_REVISION=\"TC_SIM7070G_V1\"
    -D HW_CONFIG_FILE=\"hardware/hw_tc_sim7070g_v1.h\"
    -D MODEM_TYPE_SIM7070G
    -D BOARD_HAS_FUEL_GAUGE
    -D BOARD_HAS_THERMOCOUPLE=3
    -D BOARD_HAS_SD_CARD

